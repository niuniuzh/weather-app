name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - os: macos-latest
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build

      - name: Collect release files (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release
          cp src-tauri/target/release/bundle/deb/*.deb release/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage release/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/rpm/*.rpm release/ 2>/dev/null || true

      - name: Collect release files (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p release
          cp src-tauri/target/release/bundle/dmg/*.dmg release/ 2>/dev/null || true

      - name: Collect release files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item src-tauri\target\release\bundle\msi\*.msi release\ -ErrorAction SilentlyContinue
          Copy-Item src-tauri\target\release\bundle\nsis\*.exe release\ -ErrorAction SilentlyContinue

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
